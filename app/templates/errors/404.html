{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}
{% block content %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; padding:3rem 1.5rem;">
  <div style="font-family:var(--font-display); font-size:8rem; font-weight:800; color:var(--border); line-height:1; margin-bottom:1rem;">404</div>
  <h1 style="font-size:1.875rem; font-weight:800; margin-bottom:.625rem;">Page not found</h1>
  <p style="color:var(--text-secondary); max-width:38ch; margin-bottom:2rem;">
    That page doesn't exist or may have been moved. Try heading back to the marketplace.
  </p>
  <div style="display:flex; gap:.75rem; flex-wrap:wrap; justify-content:center;">
    <a href="{{ url_for('main.index') }}" class="btn-primary">Go Home</a>
    <a href="{{ url_for('main.browse') }}" class="btn-ghost">Browse Cars</a>
  </div>
</div>
{% endblock %}
